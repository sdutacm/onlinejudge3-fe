name: Build and Upload to CDN
on:
  pull_request:
  push:
    branches:
      - master
      - release/*
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - run: pnpm run build

      - run: pnpm run check:dva-models

      - run: pnpm run build:competition-side

      - run: pnpm run check:built-assets

      - run: pnpm run e2e:built

      - run: pnpm run e2e:smoke

  build-and-upload-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    env:
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_DOMAIN: ${{ secrets.COS_DOMAIN }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
      COS_TARGET_BASE: ${{ secrets.COS_TARGET_BASE }}
      CDN_URL: ${{ secrets.CDN_URL }}
      MEDIA_URL: ${{ secrets.MEDIA_URL }}
      DATA_USING_GIT: ${{ secrets.DATA_USING_GIT }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm run build:cdn

  build-and-upload-release-cs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    env:
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_DOMAIN: ${{ secrets.COS_DOMAIN }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
      COS_TARGET_BASE: ${{ secrets.COS_TARGET_BASE }}
      CDN_URL: ${{ secrets.CDN_URL }}
      MEDIA_URL: ${{ secrets.MEDIA_URL }}
      DATA_USING_GIT: 0
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm run build:competition-side:cdn
