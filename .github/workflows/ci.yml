name: Build and Upload to CDN
on:
  pull_request:
  push:
    branches:
      - master
      - release/*
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - run: pnpm run build

      - run: pnpm run check:dva-models

      - run: pnpm run build:competition-side

      - run: pnpm run check:built-assets

      - run: pnpm run e2e:built

      - run: pnpm run e2e:smoke

  build-and-upload-release:
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/'))
    env:
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_DOMAIN: ${{ secrets.COS_DOMAIN }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
      COS_TARGET_BASE: ${{ secrets.COS_TARGET_BASE }}
      CDN_URL: ${{ secrets.CDN_URL }}
      MEDIA_URL: ${{ secrets.MEDIA_URL }}
      DATA_USING_GIT: ${{ secrets.DATA_USING_GIT }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SSR bundle
        run: pnpm run build:ssr

      - name: Upload frontend artifacts to CDN
        run: node tasks/upload-cdn.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract SSR Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/onlinejudge3-ssr
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push SSR Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ssr
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

  build-and-upload-release-cs:
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/'))
    env:
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_DOMAIN: ${{ secrets.COS_DOMAIN }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
      COS_TARGET_BASE: ${{ secrets.COS_TARGET_BASE }}
      CDN_URL: ${{ secrets.CDN_URL }}
      MEDIA_URL: ${{ secrets.MEDIA_URL }}
      DATA_USING_GIT: 0
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm run build:competition-side:cdn
